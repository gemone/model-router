# 使用路由的 Profile
# 使用方式: POST /api/production/v1/chat/completions

id: "production"
name: "Production"
path: "production"
description: "生产环境 - 使用路由策略选择模型"
enabled: true

# 路由绑定 - 使用路由策略选择模型
route_ids:
  - "high-availability-route"
  - "cost-optimized-route"

# Fallback 配置
fallback_models:
  - "gpt-3.5-turbo"

# 功能配置
enable_compression: true
compression_strategy: "sliding_window"
compression_level: "threshold"
compression_threshold: 4000
max_context_window: 8000
